<!-- Search Input – BOC Design System (node 15175:19414) -->
<div
  class="search-input"
  [class]="'status-' + status()"
  [class.is-disabled]="disabled()"
  [class.is-filled]="value()"
>

  <!-- Label row: only rendered when at least one of label or hint is provided -->
  @if (label() || hint()) {
    <div class="search-input__header">
      <div class="search-input__label-group">
        <label class="search-input__label" [for]="label()">{{ label() }}</label>
      </div>

      @if (hint()) {
        <span class="search-input__hint">{{ hint() }}</span>
      }
    </div>
  }

  <!-- Input box -->
  <div class="search-input__box">

    <!-- Left icon: decorative, hidden from assistive technology -->
    @if (showLeftIcon() || leftIcon()) {
      <span class="search-input__icon search-input__icon--left" aria-hidden="true">
        @if (leftIcon()) {
          <!-- CSS mask renders the external SVG using currentColor, keeping it theme-aware -->
          <span
            class="search-input__mask"
            [style.mask-image]="'url(' + leftIcon() + ')'"
            [style.-webkit-mask-image]="'url(' + leftIcon() + ')'">
          </span>
        }
      </span>
    }

    @if (prefix()) {
      <div class="search-input__prefix">
        <span class="search-input__prefix-text">{{ prefix() }}</span>
        <span class="search-input__divider" aria-hidden="true"></span>
      </div>
    }

    <input
      class="search-input__field"
      type="text"
      [id]="label()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [value]="value()"
      (input)="onInput($event)"
      (keydown.enter)="onSearch()"
      autocomplete="off"
      aria-autocomplete="none"
    />

    <!-- Right icon: interactive button that triggers the search action -->
    @if (showSearchIcon() || rightIcon()) {
      <button
        type="button"
        class="search-input__icon search-input__icon--right"
        (click)="onSearch()"
        [disabled]="disabled()"
        aria-label="Buscar"
      >
        @if (rightIcon()) {
          <span
            class="search-input__mask"
            [style.mask-image]="'url(' + rightIcon() + ')'"
            [style.-webkit-mask-image]="'url(' + rightIcon() + ')'">
          </span>
        } @else {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 21L16.65 16.65"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </button>
    }

  </div>

  <!-- Feedback row: role="alert" announces changes to screen readers as they happen -->
  @if (feedbackMessage()) {
    <div class="search-input__feedback" role="alert" aria-live="polite">
      <span class="search-input__feedback-icon" aria-hidden="true">
        @if (feedbackIcon()) {
          <span
            class="search-input__mask--sm"
            [style.mask-image]="'url(' + feedbackIcon() + ')'"
            [style.-webkit-mask-image]="'url(' + feedbackIcon() + ')'">
          </span>
        } @else {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M8 11V8M8 5H8.01M15 8C15 11.866 11.866 15 8 15C4.13401 15 1 11.866 1 8C1 4.13401 4.13401 1 8 1C11.866 1 15 4.13401 15 8Z"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </span>
      <span class="search-input__feedback-text">{{ feedbackMessage() }}</span>
    </div>
  }

</div>
