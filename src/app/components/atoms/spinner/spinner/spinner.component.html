<!--
  UiSpinnerComponent – Template
  ──────────────────────────────────────────────────────────────────
  Reusable loading indicator.
  Supports fullscreen overlay and inline usage.
  Uses radial segmented animation to simulate loading state.
  ──────────────────────────────────────────────────────────────────
-->

<!-- ── Root container ─────────────────────────────────────────────── -->
<div [class]="containerClass" [hidden]="!visible" [attr.aria-hidden]="!visible">
  <!-- Accessibility wrapper for screen readers -->
  <div class="spinner__content" role="status" [attr.aria-label]="ariaLabel">
    <!-- Spinner indicator (size controlled via modifier class) -->
    <div [class]="indicatorClass">

      <!-- Radial segments (8 total) used for animation -->
      <span class="spinner__segment spinner__segment--1"></span>
      <span class="spinner__segment spinner__segment--2"></span>
      <span class="spinner__segment spinner__segment--3"></span>
      <span class="spinner__segment spinner__segment--4"></span>
      <span class="spinner__segment spinner__segment--5"></span>
      <span class="spinner__segment spinner__segment--6"></span>
      <span class="spinner__segment spinner__segment--7"></span>
      <span class="spinner__segment spinner__segment--8"></span>

    </div>
  </div>
</div>
